<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Humor Hub | © 2026 vetruk_x</title>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // Disable F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
    <link rel="stylesheet" href="style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="profile-section">
        <div class="profile-pic"></div>
        <h2>STREET HUMOR HUB</h2>
        <p class="sub-head">Official Portfolio & Community 🇰🇪</p>
    </div>

    <div class="links-container">
        <a href="https://whatsapp.com/channel/0029Vb7QkV14dTnBkzndP63f" class="link-card highlight-whatsapp" target="_blank">
            <span>📢 JOIN THE OFFICIAL CHANNEL</span>
        </a>

        <a href="https://www.instagram.com/vetruk_x" class="link-card" target="_blank">
            <span>📸 FOLLOW @VETRUK_X</span>
        </a>

        <div class="link-card chat-trigger" onclick="toggleChat()">
            <span>💬 LIVE COMMUNITY CHAT</span>
        </div>

        <a href="tel:+254797989297" class="link-card">
            <span>📞 HIRE TIMON: 0797989297</span>
        </a>
    </div>

    <div id="chat-box" class="chat-popup">
        <div class="chat-header">
            <div><span class="status-dot"></span><span>Secure Lobby</span></div>
            <button class="close-btn" onclick="toggleChat()">×</button>
        </div>
        <div id="chat-window" class="chat-window"></div>
        <div class="chat-input-area">
            <input type="text" id="user-name" placeholder="Name" maxlength="12">
            <input type="text" id="user-msg" placeholder="Message..." maxlength="100">
            <button id="send-btn">➤</button>
        </div>
    </div>

    <footer>
        <p>© 2026 Street Humor Hub. All Rights Reserved.</p>
        <p style="font-size: 0.6rem; margin-top: 5px; opacity: 0.5;">Developed & Protected by Timon</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const chatRef = ref(db, "global_chat");

        window.toggleChat = function() {
            document.getElementById('chat-box').classList.toggle('active');
        }

        const sendBtn = document.getElementById("send-btn");
        const uName = document.getElementById("user-name");
        const uMsg = document.getElementById("user-msg");
        const chatWindow = document.getElementById("chat-window");

        sendBtn.onclick = () => {
            const name = uName.value.trim().replace(/<[^>]*>?/gm, ''); // Basic XSS Protection
            const text = uMsg.value.trim().replace(/<[^>]*>?/gm, ''); 
            
            if (text !== "") {
                push(chatRef, {
                    name: name || "Guest",
                    text: text,
                    time: serverTimestamp()
                });
                uMsg.value = "";
            }
        };

        onChildAdded(chatRef, (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement("div");
            msgDiv.className = `msg ${data.name === uName.value ? 'me' : 'others'}`;
            msgDiv.innerHTML = `<b>${data.name}</b> ${data.text}`;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
